<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Agent Availability Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Agent Availability</h2>

    <form id="form">
      <input 
        type="text" 
        id="phoneNumber" 
        placeholder="Phone Number (e.g. +14801234567)" 
        required 
      />

      <input 
        type="text" 
        id="stateCode" 
        placeholder="State Code (optional, e.g. AZ)" 
      />

      <button type="submit">Check Availability</button>
    </form>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
